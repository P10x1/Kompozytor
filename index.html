<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kompozytor klasówek — Rejskie Wydawnictwo</title>
  
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    :root{--accent:#0b5cff;--muted:#777;--danger:#e63946}
    body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial; margin:0; background:#f4f6fb; color:#222; overflow-x: hidden;}
    
    /* Trzykolumnowy układ aplikacji */
    .app-container {
      display: grid;
      grid-template-columns: 300px 400px 1fr;
      min-height: calc(100vh - 70px);
      position: relative;
      transition: grid-template-columns 0.3s ease;
    }

    .app-container.sidebar-collapsed {
      grid-template-columns: 0px 400px 1fr;
    }

    /* 1. PANEL LEWY */
    .sidebar-panel {
      background: white;
      box-shadow: 4px 0 15px rgba(12,20,40,0.03);
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    .sidebar-content {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .sidebar-panel.collapsed .sidebar-content {
      display: none;
    }

    .toggle-sidebar-btn {
      position: absolute;
      top: 20px;
      right: -24px;
      width: 24px;
      height: 50px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 2px 2px 5px rgba(11,92,255,0.2);
      z-index: 11;
      padding: 0;
    }

    /* 2. PANEL ŚRODKOWY */
    .middle-workspace {
      background: #f8fafc;
      padding: 20px;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* 3. PANEL PRAWY */
    .right-preview-workspace {
      padding: 20px;
      background: #e2e8f0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .panel-header-box {
      width: 100%;
      max-width: 780px;
      background: white;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .hidden{display:none!important}
    .series-list{display:flex; flex-direction:column; gap:8px}
    .levels{display:flex; gap:6px; margin-top:6px}
    .level{background:#f3f5ff; padding:4px 8px; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px;}
    .level.active{background:var(--accent); color:white}
    
    .search-row{display:flex; flex-direction: column; gap:8px; margin-bottom:12px}
    input[type="search"], select, input[type="text"], textarea {padding:8px 12px; border-radius:8px; border:1px solid #e6e9f2; box-sizing: border-box;}
    
    .topic-grid{display:flex; flex-direction:column; gap:6px;}
    .topic{padding:10px; background:#fff; border-radius:8px; cursor:pointer; border:1px solid #e8ebf8; font-size:13px; line-height: 1.4;}
    .task-list{display:grid; gap:8px}
    
    /* GŁÓWNY ELEMENT ZADANIA NA LIŚCIE */
    .task{display:flex; gap:10px; align-items:flex-start; padding:12px; border-radius:8px; background:#fff; border:1px solid #e2e8f0; cursor:pointer; transition: background 0.15s; position: relative;}
    .task:hover {background: #f0f4ff; border-color: #cbd5e1;}
    .task .meta{font-size:12px; color:var(--muted); margin-top: 4px; line-height: 1.4;}
    
    /* Przycisk edycji na liście zadań */
    .btn-edit-task {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: normal;
      transition: all 0.1s;
    }
    .btn-edit-task:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    /* KARTKI A4 */
    .test-page-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
      max-width: 780px;
    }
    
    .test-page {
      background: white;
      width: 100%;
      height: 1103px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      border: 1px solid #cbd5e1;
      box-sizing: border-box;
      padding: 55px 50px;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .test-page-content {
      flex: 1;
      overflow: hidden;
    }

    .header-row{display:flex; justify-content:space-between; align-items:center}
    .rw-logo img{height:42px}
    .test-meta{display:flex; gap:6px; align-items:center; font-size:13px;}
    
    ol.tasks{padding-left:0; margin-top: 15px; list-style-type: none;}
    
    .task-item {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .task-item-body {
      flex: 1;
    }

    /* Reguła dla obrazów wrzucanych do treści zadań - surowe, naturalne krawędzie */
    .task-item-body img {
      border-radius: 0 !important;
      box-shadow: none !important;
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 10px;
    }

    .task-move-buttons {
      display: flex;
      gap: 3px;
    }
    .btn-move {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #cbd5e1;
      padding: 4px 7px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-move:hover {
      background: var(--accent);
      color: white;
    }
    .btn-delete {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fee2e2;
    }
    .btn-delete:hover {
      background: var(--danger);
      color: white;
    }

    .actions{display:flex; gap:6px; justify-content:flex-end}
    button{background:var(--accent); color:white; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-weight: 600; font-size:13px;}
    button:hover{opacity: 0.9;}
    button.ghost{background:transparent; color:var(--accent); border:1px solid #dbe6ff}
    
    .series { background: #fdfdfd; border-radius: 8px; padding: 10px; border: 1px solid #e8ebf8; cursor: pointer; }
    .series .title { font-size: 13px; font-weight: 700; color: #222; }
    .series-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .series-footer .edition { color: #d64cc0; font-weight: 600; font-size: 10px; }

    .topic.active { background: #e8f0ff; border-color: var(--accent); font-weight: 600; }
    .subtopic { background:#f9fbff; border-left:3px solid var(--accent); }
    .subtopic.active { background:#dfeaff; font-weight:600; }
    
    @media print {
      header, .sidebar-panel, .middle-workspace, .panel-header-box, .task-move-buttons { display: none !important; }
      body, .right-preview-workspace { background: white; padding: 0; margin: 0; }
      .app-container { display: block; }
      .test-page-container { width: 100%; gap: 0; max-width: 100%; }
      .test-page { border: none; box-shadow: none; padding: 0; margin: 0; page-break-after: always; break-after: always; width: 210mm; height: 297mm; }
    }

    /* Modal */
    #customTaskModal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 24px; width: 420px; max-width: 95%;
      border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); z-index: 9999;
    }
    #customTaskModal h3 { margin-top: 0; margin-bottom: 14px; }
    #customTaskModal label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    #customTaskModal input, #customTaskModal textarea, #customTaskModal select { margin-bottom: 14px; width: 100%;}
    #customTaskModal .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:9998; }
  </style>
</head>

        <div class="task-list" id="taskList"></div>

    </div>

    <div class="right-preview-workspace">

            <label for="titleInput" style="font-weight:700; font-size:13px; white-space:nowrap;">Tytuł testu:</label>
            <input id="titleInput" type="text" placeholder="Wpisz tytuł sprawdzianu..." style="flex:1; padding:6px 10px; font-size:13px;">
          </div>
          <div class="actions">
            <button class="ghost" id="clearBtn" style="padding:6px 12px; font-size:12px;">Wyczyść</button>
            <button id="printBtn" style="padding:6px 12px; font-size:12px;">Drukuj</button>

        </div>
      </div>

      <div class="test-page-container" id="testPageContainer">

        </div>
      </div>
    </div>

  </div>

      <button id="modalCancelBtn" class="ghost">Anuluj</button>

    };

    let currentSeries = '';
    let currentLevel = '';
    let currentTopic = '';
    let currentSubtopic = '';
    let selectedTasks = [];
    let editingTaskId = null; // Przechowuje ID edytowanego zadania (null = dodawanie nowego)

    document.addEventListener("DOMContentLoaded", () => {
      initSeries();
      setupEventListeners();
    });

    function initSeries() {
      const container = document.getElementById('seriesList');
      container.innerHTML = DATA.series.map(s => `
        <div class="series" onclick="selectSeries('${s.id}')" id="series_${s.id}">
          <div class="title">${s.title}</div>
          <div class="series-footer">
            <div class="levels">
              ${s.levels.map(l => `<span class="level" onclick="event.stopPropagation(); selectLevel('${s.id}', '${l}')" id="level_${s.id}_${l}">${l}</span>`).join('')}
            </div>
            <div class="edition">${s.edition}</div>
          </div>
        </div>
      `).join('');
    }

    function selectSeries(id) {
      currentSeries = id;
      document.querySelectorAll('.series').forEach(el => el.style.borderColor = '#e8ebf8');
      document.getElementById(`series_${id}`).style.borderColor = 'var(--accent)';
    }

    window.selectLevel = function(seriesId, level) {
      selectSeries(seriesId);
      currentLevel = level;
      document.querySelectorAll('.level').forEach(el => el.classList.remove('active'));
      document.getElementById(`level_${seriesId}_${level}`).classList.add('active');
      showTopics();
    }

    function showTopics() {
      const key = `${currentSeries}:${currentLevel}`;
      const topics = DATA.topics[key] || [];
      const grid = document.getElementById('topicGrid');
      
      grid.innerHTML = topics.map(t => `
        <div class="topic" id="topic_${t}" onclick="selectTopic('${t}')">${t}</div>
      `).join('');
      
      document.getElementById('topicsBox').classList.remove('hidden');
      document.getElementById('subtopicGrid').classList.add('hidden');
      document.getElementById('middleContent').classList.add('hidden');
      document.getElementById('middleEmptyNotice').classList.remove('hidden');
    }

    window.selectTopic = function(topicName) {
      currentTopic = topicName;
      currentSubtopic = '';
      document.querySelectorAll('.topic').forEach(el => el.classList.remove('active'));
      const activeEl = document.getElementById(`topic_${topicName}`);
      if(activeEl) activeEl.classList.add('active');

      if (DATA.subtopics[topicName]) {
        const subGrid = document.getElementById('subtopicGrid');
        subGrid.classList.remove('hidden');
        subGrid.innerHTML = DATA.subtopics[topicName].map(st => `
          <div class="topic subtopic" id="subtopic_${st}" onclick="selectSubtopic('${st}')">${st}</div>
        `).join('');
        document.getElementById('middleContent').classList.add('hidden');
        document.getElementById('middleEmptyNotice').classList.remove('hidden');
      } else {
        document.getElementById('subtopicGrid').classList.add('hidden');
        revealMiddleWorkspace();
      }
    }

    window.selectSubtopic = function(subtopicName) {
      currentSubtopic = subtopicName;
      document.querySelectorAll('.subtopic').forEach(el => el.classList.remove('active'));
      document.getElementById(`subtopic_${subtopicName}`).classList.add('active');
      revealMiddleWorkspace();
    }

    function revealMiddleWorkspace() {
      document.getElementById('middleEmptyNotice').classList.add('hidden');
      document.getElementById('middleContent').classList.remove('hidden');
      renderTaskList();
    }

    function renderTaskList() {
      const searchVal = document.getElementById('searchTasks').value.toLowerCase();
      const typeVal = document.getElementById('typeFilter').value;
      const container = document.getElementById('taskList');
      
      let filtered = DATA.tasks.filter(t => {
        return t.series === currentSeries && t.level === currentLevel && t.topic === currentTopic && (currentSubtopic ? t.subtopic === currentSubtopic : true);
      });

      if(searchVal) {
        filtered = filtered.filter(t => t.title.toLowerCase().includes(searchVal) || (typeof t.body === 'string' && t.body.toLowerCase().includes(searchVal)));
      }
      if(typeVal) {
        filtered = filtered.filter(t => t.type === typeVal);
      }

      if(filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; color:#aaa; font-size:13px;">Brak zadań.</div>`;
        return;
      }

      // Wstrzyknięcie przycisku edycji "✏️" obok nazwy zadania
      container.innerHTML = filtered.map(t => `
        <div class="task" onclick="addTaskToTest('${t.id}')">
          <div style="width:100%;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap: 8px;">
              <strong style="font-size:13px; color:#1e293b; flex:1;">${t.title}</strong>
              <div style="display:flex; align-items:center; gap:4px;" onclick="event.stopPropagation();">
                <button class="btn-edit-task" onclick="openEditTaskModal('${t.id}')" title="Edytuj treść zadania w bazie">✏️</button>
                <span style="background:#e0f2fe; color:#0369a1; padding:2px 5px; border-radius:4px; font-size:10px; font-weight:700;">${t.type}</span>
              </div>
            </div>
            <div class="meta">${typeof t.body === 'string' ? t.body.replace(/\n/g, '<br>') : t.body.join(', ')}</div>
          </div>
        </div>
      `).join('');
    }

    // Otwieranie Modala w trybie EDYCJI zadania
    window.openEditTaskModal = function(id) {
      const task = DATA.tasks.find(t => t.id === id);
      if(!task) return;

      editingTaskId = id;
      document.getElementById('modalHeaderTitle').innerText = "Edytuj zadanie w bazie";
      
      // Czyszczenie dopisków przy edycji bazy, żeby nie kumulować tekstu "(Własne)"
      document.getElementById('ctTitle').value = task.title.replace(' (Własne)', '').replace(' (Edytowane)', '');
      document.getElementById('ctBody').value = Array.isArray(task.body) ? task.body.join('\n') : task.body;
      document.getElementById('ctType').value = task.type;

      document.getElementById('customTaskModal').classList.remove('hidden');
      document.getElementById('modalOverlay').classList.remove('hidden');
    }

    window.addTaskToTest = function(id) {
      const task = DATA.tasks.find(t => t.id === id);
      if(task) {
        selectedTasks.push({...task, uniqueId: Date.now() + Math.random().toString(36).substr(2, 5)});
        renderTestPreview();
      }
    }

    function renderTestPreview() {
      const container = document.getElementById('testPageContainer');
      container.innerHTML = '';

      if (selectedTasks.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:40px; color:#777; font-weight:500; background:white; border-radius:8px; border:1px dashed #cbd5e1; width:100%; box-sizing:border-box;" id="emptyNotice">
            Arkusz jest pusty. Kliknij wybrane zadania ze środkowej kolumny, aby je tutaj dodać.
          </div>
        `;
        return;
      }

      let pageNum = 1;
      let currentPage = createNewPageStructure(pageNum);
      container.appendChild(currentPage);
      let currentList = currentPage.querySelector('.tasks');

      const maxContentHeight = 840; 

      selectedTasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'task-item';
        
        let bodyHtml = '';
        if (typeof task.body === 'string') {
          bodyHtml = task.body.replace(/\n/g, '<br>');
        } else if (Array.isArray(task.body)) {
          bodyHtml = `<ul style="padding-left:20px; margin-top:5px;">${task.body.map(b => `<li>${b} [P / F]</li>`).join('')}</ul>`;
        }

        // Tytuły oczyszczamy z technicznych dopisków systemowych przy generowaniu arkusza
        const cleanTitle = task.title.replace(' (Własne)', '').replace(' (Edytowane)', '');

        li.innerHTML = `
          <div class="task-item-body">
            <strong style="font-size:15px; display:block; margin-bottom:4px;">Zadanie ${index + 1}. <span style="font-weight:500;">${cleanTitle}</span></strong>
            <div style="padding-left:4px; font-size:14px; color:#333; line-height: 1.5;">${bodyHtml}</div>
          </div>
          <div class="task-move-buttons">
  <button class="btn-move" onclick="moveTask(${index}, -1)">▲</button>
  <button class="btn-move" onclick="moveTask(${index}, 1)">▼</button>
  <button class="btn-move btn-delete" onclick="deleteTask(${index})">🗑️</button>
</div>
        `;

        currentList.appendChild(li);

        if (currentList.offsetHeight > maxContentHeight && currentList.children.length > 1) {
          currentList.removeChild(li);
          pageNum++;
          currentPage = createNewPageStructure(pageNum);
          container.appendChild(currentPage);
          currentList = currentPage.querySelector('.tasks');
          currentList.appendChild(li);
        }
      });

      updateFooters();
    }

    function createNewPageStructure(pageNum) {
      const page = document.createElement('div');
      page.className = 'test-page';
      
      let headerHtml = `
        <div class="header-row">
          <div class="rw-logo"><img src="RW.png" alt="RW logo" onerror="this.style.display='none'" /></div>
          <div class="test-meta">
            <span>Imię i nazwisko:</span>
            <div style="border-bottom:1px solid #000; width:160px; height:14px"></div>
            <span>Klasa, Data:</span>
            <div style="width:90px; border-bottom:1px solid #000; height:14px"></div>
          </div>
        </div>
        <hr style="margin:12px 0; border:none; border-top:1px dashed #cfd4dc" />
      `;

      if (pageNum > 1) {
        headerHtml = `
          <div class="header-row">
            <div class="rw-logo"><img src="RW.png" alt="RW logo" onerror="this.style.display='none'" /></div>
            <div style="font-size:11px; color:#777; font-weight:600; text-align:right;">Strona ${pageNum} (Kontynuacja)</div>
          </div>
          <hr style="margin:12px 0; border:none; border-top:1px dashed #cfd4dc" />
        `;
      }

      page.innerHTML = `
        <div class="test-page-content">
          ${headerHtml}
          <ol class="tasks"></ol>
        </div>
        <div class="test-footer" style="display:flex; justify-content:space-between; align-items:center; font-size:12px; border-top:1px solid #000; padding-top:6px; margin-top:10px; flex-shrink:0;">
          <div><img src="RW-KOM.png" alt="RW logo" style="height:26px" onerror="this.style.display='none'"/></div>
          <div><span class="dynamic-footer-title" style="font-weight:700;">Tytuł testu</span></div>
          <div><span class="dynamic-footer-date"></span></div>
        </div>
      `;
      return page;
    }

    function updateFooters() {
      const userTitle = document.getElementById('titleInput').value || 'Tytuł testu';
      const today = new Date().toLocaleDateString('pl-PL');
      document.querySelectorAll('.dynamic-footer-title').forEach(el => el.innerText = userTitle);
      document.querySelectorAll('.dynamic-footer-date').forEach(el => el.innerText = today);
    }

    window.moveTask = function(index, direction) {
      const newIndex = index + direction;
      if (newIndex >= 0 && newIndex < selectedTasks.length) {
        const temp = selectedTasks[index];
        selectedTasks[index] = selectedTasks[newIndex];
        selectedTasks[newIndex] = temp;
        renderTestPreview();
      }
    }

    window.deleteTask = function(index) {
      selectedTasks.splice(index, 1);
      renderTestPreview();
    }

    function setupEventListeners() {
      const sidebarPanel = document.getElementById('sidebarPanel');
      const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
      const appContainer = document.getElementById('appContainer');
      
      toggleSidebarBtn.addEventListener('click', () => {
        sidebarPanel.classList.toggle('collapsed');
        appContainer.classList.toggle('sidebar-collapsed');
        toggleSidebarBtn.innerText = sidebarPanel.classList.contains('collapsed') ? '▶' : '◀';
      });

      document.getElementById('searchTasks').addEventListener('input', renderTaskList);
      document.getElementById('typeFilter').addEventListener('change', renderTaskList);
      document.getElementById('titleInput').addEventListener('input', updateFooters);

      document.getElementById('clearBtn').addEventListener('click', () => {
        selectedTasks = [];
        renderTestPreview();
      });

      document.getElementById('printBtn').addEventListener('click', () => {
        window.print();
      });

      document.getElementById('savePdf').addEventListener('click', () => {
  // Pobieramy element testu (w zależności od tego, czy używasz akurat struktury jedno- czy wielostronicowej)
  const element = document.getElementById('testCard') || document.getElementById('testPageContainer');
  const testTitle = document.getElementById('titleInput').value.trim() || 'kompozytor-klasowki';
  const safeFileName = testTitle.replace(/[/\\?%*:|"<>\s]/g, '_') + '.pdf';

  // 1. Ukrywamy techniczne przyciski (strzałki, kosz), aby nie trafiły do PDF
  const buttons = document.querySelectorAll('.task-move-buttons');
  buttons.forEach(btn => btn.style.display = 'none');

  // 2. Tymczasowo zdejmujemy cienie i ramki w CSS za pomocą klasy lub stylów bezpośrednich
  const originalShadow = element.style.boxShadow;
  const originalBorder = element.style.border;
  element.style.boxShadow = 'none';
  element.style.border = 'none';

  // CONFIG: Kluczowe modyfikacje usuwające ramki i wymuszające idealne białe tło papieru
  const opt = {
    margin:       0, // Brak marginesów zewnętrznych, które tworzą biało-szare obwódki
    filename:     safeFileName,
    image:        { type: 'jpeg', quality: 1.0 }, // Podnosimy jakość do maksimum
    html2canvas:  { 
      scale: 2, 
      useCORS: true,
      logging: false,
      backgroundColor: '#ffffff', // Wymuszamy czyste, białe tło (likwiduje szare artefakty)
      removeContainer: true       // Usuwa techniczny kontener renderujący biblioteki
    },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  // 3. Generujemy plik, a po zapisaniu przywracamy pierwotny wygląd aplikacji na ekranie
  html2pdf().set(opt).from(element).save().then(() => {
    buttons.forEach(btn => btn.style.display = 'flex');
    element.style.boxShadow = originalShadow;
    element.style.border = originalBorder;
  }).catch(err => {
    // W razie błędu też przywracamy przyciski
    buttons.forEach(btn => btn.style.display = 'flex');
    element.style.boxShadow = originalShadow;
    element.style.border = originalBorder;
    console.error(err);
  });
});

      // OBSŁUGA OKNA MODALNEGO (DODAWANIE I EDYCJA)
      const addCustomTaskBtn = document.getElementById('addCustomTaskBtn');
      const customTaskModal = document.getElementById('customTaskModal');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalCancelBtn = document.getElementById('modalCancelBtn');
      const modalSaveBtn = document.getElementById('modalSaveBtn');

      addCustomTaskBtn.addEventListener('click', () => {
        if(!currentSeries || !currentLevel || !currentTopic) {
          alert('Najpierw wybierz serię, poziom oraz dział w lewym menu!');
          return;
        }
        editingTaskId = null; // Tryb dodawania nowego zadania
        document.getElementById('modalHeaderTitle').innerText = "Dodaj własne zadanie";
        customTaskModal.classList.remove('hidden');
        modalOverlay.classList.remove('hidden');
      });

      const closeModal = () => {
        customTaskModal.classList.add('hidden');
        modalOverlay.classList.add('hidden');
        document.getElementById('ctTitle').value = '';
        document.getElementById('ctBody').value = '';
        editingTaskId = null;
      };

      modalCancelBtn.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', closeModal);

      modalSaveBtn.addEventListener('click', () => {
        const title = document.getElementById('ctTitle').value.trim();
        const bodyText = document.getElementById('ctBody').value.trim();
        const type = document.getElementById('ctType').value;

        if(!title) {
          alert('Wpisz polecenie zadania.');
          return;
        }

        // Obsługa formatowania Prawda/Fałsz jako tablica, jeśli wybrano ten typ i tekst ma linie
        let finalBody = bodyText;
        if (type === 'PF' && bodyText.includes('\n')) {
          finalBody = bodyText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        }

        if (editingTaskId !== null) {
          // --- TRYB EDYCJI ISTNIEJĄCEGO ZADANIA ---
          const taskIndex = DATA.tasks.findIndex(t => t.id === editingTaskId);
          if (taskIndex !== -1) {
            DATA.tasks[taskIndex].title = title + " (Edytowane)";
            DATA.tasks[taskIndex].body = finalBody;
            DATA.tasks[taskIndex].type = type;

            // Synchronizacja zmian na arkuszu sprawdzianu (jeśli zadanie już tam było dodane)
            selectedTasks.forEach(st => {
              if (st.id === editingTaskId) {
                st.title = title + " (Edytowane)";
                st.body = finalBody;
                st.type = type;
              }
            });
          }
        } else {
          // --- TRYB TWORZENIA NOWEGO ZADANIA ---
          const newCustomTask = {
            id: 'custom_' + Date.now(),
            title: title + " (Własne)",
            type: type,
            topic: currentTopic,
            series: currentSeries,
            level: currentLevel,
            body: finalBody
          };
          if(currentSubtopic) newCustomTask.subtopic = currentSubtopic;
          DATA.tasks.push(newCustomTask);
        }

        renderTaskList();
        renderTestPreview();
        closeModal();
      });
    }
  </script>
</body>
</html>
